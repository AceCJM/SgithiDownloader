<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Task Progress - SgithiDownloader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .progress {
            height: 25px;
            border-radius: 15px;
            background-color: #e9ecef;
        }
        .progress-bar {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border-radius: 15px;
            transition: width 0.3s ease;
        }
        .status-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .status-starting { color: #ffc107; }
        .status-downloading { color: #007bff; }
        .status-completed { color: #28a745; }
        .status-error { color: #dc3545; }
        .status-unknown { color: #6c757d; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="card-title text-center mb-4">
                            <i class="fas fa-chart-line"></i> Task Progress
                        </h2>

                        <div class="text-center mb-4">
                            <div id="status-icon" class="status-icon status-starting">
                                <i class="fas fa-spinner fa-spin"></i>
                            </div>
                            <h4 id="status-text">Initializing task...</h4>
                            <p class="text-muted" id="task-info">
                                Task ID: {{ task_id }}<br>
                                URL: {{ task_info.url[:50] }}{% if task_info.url|length > 50 %}...{% endif %}<br>
                                Type: {{ task_info.type }} | Format: {{ task_info.format }}
                            </p>
                        </div>

                        <div class="mb-4">
                            <div class="progress">
                                <div id="progress-bar" class="progress-bar" role="progressbar"
                                     style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                                    <span id="progress-text">0%</span>
                                </div>
                            </div>
                        </div>

                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            <span id="message">Preparing task...</span>
                        </div>

                        <div class="text-center">
                            <a href="/" class="btn btn-primary me-2">
                                <i class="fas fa-plus"></i> New Download
                            </a>
                            <a href="/downloads" class="btn btn-secondary">
                                <i class="fas fa-folder"></i> View Downloads
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const taskId = '{{ task_id }}';
        let updateInterval;

        function updateProgress() {
            fetch(`/api/progress/${taskId}`)
                .then(response => response.json())
                .then(data => {
                    const progressBar = document.getElementById('progress-bar');
                    const progressText = document.getElementById('progress-text');
                    const statusIcon = document.getElementById('status-icon');
                    const statusText = document.getElementById('status-text');
                    const message = document.getElementById('message');

                    // Update progress bar
                    const progress = data.progress || 0;
                    progressBar.style.width = `${progress}%`;
                    progressBar.setAttribute('aria-valuenow', progress);
                    progressText.textContent = `${Math.round(progress)}%`;

                    // Update status
                    const status = data.status || 'unknown';
                    statusText.textContent = getStatusText(status);
                    message.textContent = data.message || 'Processing...';

                    // Update icon and classes
                    statusIcon.className = `status-icon status-${status}`;
                    statusIcon.innerHTML = getStatusIcon(status);

                    // Stop polling if completed or error
                    if (status === 'completed' || status === 'error') {
                        clearInterval(updateInterval);
                        if (status === 'completed') {
                            // If a single file was produced, trigger browser download automatically
                            if (data.files && data.files.length === 1) {
                                const filename = encodeURIComponent(data.files[0]);
                                const link = document.createElement('a');
                                link.href = `/download_file/${filename}`;
                                link.download = data.files[0];
                                document.body.appendChild(link);
                                link.click();
                                document.body.removeChild(link);
                            } else {
                                // otherwise redirect to downloads listing
                                setTimeout(() => {
                                    window.location.href = '/downloads';
                                }, 1000);
                            }
                        }
                    }
                })
                .catch(error => {
                    console.error('Error updating progress:', error);
                    document.getElementById('message').textContent = 'Error connecting to server...';
                });
        }

        function getStatusText(status) {
            const statusTexts = {
                'starting': 'Starting task...',
                'processing': 'Processing...',
                'downloading': 'Downloading...',
                'completed': 'Task completed!',
                'error': 'Task failed',
                'unknown': 'Status unknown'
            };
            return statusTexts[status] || 'Processing...';
        }

        function getStatusIcon(status) {
            const icons = {
                'starting': '<i class="fas fa-spinner fa-spin"></i>',
                'processing': '<i class="fas fa-cog fa-spin"></i>',
                'downloading': '<i class="fas fa-download"></i>',
                'completed': '<i class="fas fa-check-circle"></i>',
                'error': '<i class="fas fa-exclamation-triangle"></i>',
                'unknown': '<i class="fas fa-question-circle"></i>'
            };
            return icons[status] || '<i class="fas fa-spinner fa-spin"></i>';
        }

        // Start polling for progress updates
        updateProgress(); // Initial update
        updateInterval = setInterval(updateProgress, 1000); // Update every second

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        });
    </script>
</body>
</html>
